<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.5.6/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="min-h-screen grid lg:grid-cols-2">

    <!-- Branding Side -->

    <div class="bg-primary text-white flex items-center justify-center p-10">

        <div>

            <h1 class="text-5xl font-bold mb-4">
                ALA K.P. Advocates
            </h1>

            <p class="text-xl text-gray-300">
                Strategic Legal Solutions
                with Integrity & Excellence
            </p>

        </div>

    </div>

    <!-- Login Form -->

    <div class="flex items-center justify-center bg-gray-100">

        <div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-md">

            <h2 class="text-3xl font-bold mb-6">
                Sign In
            </h2>

            <form id="loginForm" class="space-y-4">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    class="w-full border p-3 rounded-lg"
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    class="w-full border p-3 rounded-lg"
                >

                <button
                    type="submit"
                    class="bg-secondary w-full py-3 rounded-lg font-bold"
                >
                    Login
                </button>

            </form>

            <div class="text-center mt-6">

                <p class="text-gray-600">
                    Need access to the client portal?
                </p>

                <a
                    href="html/request-access.html"
                    class="text-blue-600 font-semibold"
                >
                    Request Portal Access
                </a>

            </div>

        </div>

    </div>

</div>

    <script src="js/login.js"></script>
</body>
</html>
