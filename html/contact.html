<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ALA K. P. & Associates Advocates</title>
    <script src="https://cdn.tailwindcss.com"></script>
     <script>
        tailwind.config ={
            theme:{
                extend:{
                    colors:{
                        primary:"#0F172A",
                        secondary:"#D4AF37",
                        accent:"#1E293B"
                    }

                }
            }
        } 
    </script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

    <!--  Navbar -->
      <nav class="bg-primary text-white py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between">
            <a href="../index.html" class="font-bold text-xl">
              ALA K.P. Advocates
            </a>
        </div>
      </nav>

      <!-- Hero -->
       <section class="bg-primary text-white py-20 text-center">

        <h1 class="text-5xl font-bold">
            Contact us
        </h1>

        <p class="mt-4 tetx-gray-300">
            We're here to assist with your legal needs.
        </p>

       </section>

       <!-- Contact Section -->
        <section class="py-20">

            <div class="max-w-6xl mx-autp px-6">
                <div class="grid md:grid-cols-2 gap-1">

                    <!-- Contact Info -->

                    <div>

                        <h2 class="text-3xl font-bold text-primary mb-6">
                            Get in Touch
                        </h2>

                        <div class="space-y-6">
                            <div class="bg-white p-6 rounded-xl shadow">

                                <h3 class="font-bold mb-2">
                                    Phone
                                </h3>
                                <p>+254 717 14 907</p>

                            </div>
                            <div class="bg-white p-6 rounded-xl shadow">

                                <h3 class="font-bold mb-2">
                                    Email
                                </h3>

                                <p>alakpadvocates@gmail.com</p>
                                <p>praxedesak@gmail.com</p>

                            </div>

                            <div class="bg-white p-6 rounded-xl shadow">

                                <h3 class="font-bold mb-2">
                                    Location
                                </h3>

                                <p>Nairobi, Kenya</p>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Form -->

                    <div class="bg-white p-8 rounded-xl shadow-xl">

                        <h2 class="text-3xl font-bold text-primary mb-3">
                            Send Message
                        </h2>

                        <form id="conatctForm" class="space-y-5">

                            <input type="text" id="name" placeholder="Full Name" class="w-full border p-3 rounded-lg" required>
                            <input type="email" id="email" placeholder="Email Address" class="w-full border p-3 rounded-lg" required>
                            <input type="text" id="subject" placeholder="subject" class="w-full border p-3 rounded-lg" required>

                            <textarea id="Message" rows="5" placeholder="Message" class="w-full border p-3 rounded-lg" required></textarea>
                            <button type="submit" class="bg-secondary w-full py-3 rounded-lg font-bold hover:opacity-90">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        <script src="../js/contact.js"></script>
    
</body>
</html>
