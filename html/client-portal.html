<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config ={
            theme:{
                extend:{
                    colors:{
                        primary:"#0F172A",
                        secondary:"#D4AF37",
                        accent:"#1E293B"
                    }

                }
            }
        } 
    </script>
</head>
<body class="bg-gray-100">

    <nav class="bg-primary text-white py-4">

        <div class="max-w-7xl mx-auto px-6">
            <a href="../index.html" class="text-xl font-bold">
                ALA K.P. Advocates
            </a>
        </div>
    </nav>

    <section class="py-16">
         <div class="max-w-7xl mx-auto px-6">

            <h1 class="text-5xl font-bold text-primary mb-10">
                Client Portal
            </h1>

            <div class="grid md:grid-cols-3 gap-8">

                <div class="bg-white rounded-xl shadow p-8">
                    <h3 class="text-xl font-bold mb-4">
                        Appointments
                    </h3>

                    <p>
                        View your scheduled consultations.
                    </p>
                </div>

                <div class="bg-white rounded-xl shadow p-8">
                    <h3 class="text-xl font-bold mb-4">
                        Case updates
                    </h3>

                    <p>
                        Track progress of your legal matters
                    </p>
                </div>

                <div class="bg-white rounded-xl shadow p-8">
                    <h3 class="text-xl font-bold mb-4">
                        Documents
                    </h3>

                    <p>
                        Access legal documents securely.
                    </p>
                </div>

            </div>

            <div class="mt-12 bg-white rounded-xl shadow p-8">

                <h2 class="text-3xl font-bold text-primary mb-6">
                    My Appointments
                </h2>

                <div id="clientAppointments"></div>
            </div>

         </div>

    </section>
    <footer class="bg-black text-white py-12 text-center">

            <p class="text-center text-gray-400">
                    ©  <span class="year"></span>
                     ALA K. P. & Associates Advocates. All Rights Reserved.
                </p>

            </footer>

    <script src="../js/portal.js"></script>
</body>
</html>
